name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write  # needed to push to gh-pages branch and post commit comments

concurrency:
  group: pages-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true  # required if videos are stored with Git LFS

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy to gh-pages (root, preserve pr-previews/)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true  # preserves pr-previews/ subdirectory between deploys

      - name: Wait for Pages to go live
        id: wait
        run: |
          URL="https://andrevv11.github.io/video/"
          LIVE=false
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              LIVE=true
              break
            fi
            sleep 5
          done
          echo "live=$LIVE" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment deployment link on commit
        if: steps.wait.outputs.live == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            --method POST \
            -f body="Deployed: ${{ steps.wait.outputs.url }}"
