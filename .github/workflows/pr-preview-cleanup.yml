name: PR Preview Cleanup

on:
  pull_request:
    types: [closed]  # fires on both merge and manual close

permissions:
  contents: write  # push deletion commit to gh-pages branch

jobs:
  cleanup-preview:
    name: Remove PR Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute branch slug
        id: slug
        run: |
          SLUG=$(echo "${{ github.head_ref }}" \
            | sed 's/[^a-zA-Z0-9._-]/-/g' \
            | sed 's/^-//;s/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Delete preview directory and push
        run: |
          DIR="pr-previews/${{ steps.slug.outputs.slug }}"
          if [ -d "$DIR" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$DIR"
            git commit -m "chore: remove PR preview for ${{ github.head_ref }}"
            git push origin gh-pages
          else
            echo "No preview directory found at $DIR — nothing to clean up."
          fi
